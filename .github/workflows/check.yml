name: Check
on:
  push:
    branches-ignore:
      - main

jobs:

  check:
    runs-on: ubuntu-latest

    steps:

      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 2.7
          bundler: none

      - name: Install bundler
        run: gem install bundler -v 2.5.6

      - name: Try to create lockfile
        run: bundle _2.5.6_ lock
